<!DOCTYPE html>

<title>راهنمای مسیر</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#f3f5f8;
color:#222;
padding:20px;
}

.container{
max-width:900px;

}

.header{
text-align:center;
margin-bottom:35px;
}

.header h1{

}

.header p{

}

.card{

background:white;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.card img{

width:100%;
height:260px;
object-fit:cover;

}

.content{

padding:25px;

}

.content h2{

margin-bottom:12px;

}

.address{

background:#f7f7f7;
padding:15px;
border-radius:12px;

}

.btn{

display:inline-block;
margin-top:20px;
background:#0066ff;
color:white;
text-decoration:none;
padding:14px 30px;
border-radius:12px;
font-size:17px;
transition:.3s;

}

.btn:hover{

background:#004fd1;

}

.footer{

text-align:center;
color:#888;
padding:30px;

}

</style>

</head>
